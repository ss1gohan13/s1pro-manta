[mcu cm4]
serial: /tmp/klipper_host_mcu

[temperature_sensor CM4]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

#####################################################################
# Electronics Cooling Fans
#
# Three physical fans connected to PA8:
# - CM4 host cooling fan
# - Stepper-driver cooling fan 1
# - Stepper-driver cooling fan 2
#
# Normal operation:
# - Host temperature is controlled using PID.
# - Whenever X, Y, Z, Z1, or the extruder stepper is enabled,
#   fan speed is forced to at least 50%.
#####################################################################

[temperature_fan electronics_fan]
pin: PA8
sensor_type: temperature_host

control: pid
target_temp: 50.0

max_power: 1.0
max_speed: 1.0
min_speed: 0.0

kick_start_time: 0.5
off_below: 0.20
shutdown_speed: 1.0

min_temp: 0
max_temp: 100

# Starting values only. These are not tuned PID values.
pid_Kp: 2.0
pid_Ki: 5.0
pid_Kd: 0.5
pid_deriv_time: 2.0


#####################################################################
# Electronics Fan State Storage
#####################################################################

[gcode_macro _ELECTRONICS_FAN_STATE]
description: Internal electronics fan state storage
variable_driver_floor_active: 0
gcode:
    G4 P0


#####################################################################
# Electronics Fan Stepper Monitor
#####################################################################

[delayed_gcode _ELECTRONICS_FAN_MONITOR]
initial_duration: 2.0
gcode:
    {% set steppers = printer.stepper_enable.steppers %}

    {% set driver_active =
        steppers.get("stepper_x", False)
        or steppers.get("stepper_y", False)
        or steppers.get("stepper_z", False)
        or steppers.get("stepper_z1", False)
        or steppers.get("extruder", False)
    %}

    {% set previous =
        printer["gcode_macro _ELECTRONICS_FAN_STATE"].driver_floor_active|int
    %}

    {% if driver_active and previous == 0 %}
        # Require at least 50% fan speed while a monitored driver is enabled.
        SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=electronics_fan TARGET=50 MIN_SPEED=0.50 MAX_SPEED=1.0
        SET_GCODE_VARIABLE MACRO=_ELECTRONICS_FAN_STATE VARIABLE=driver_floor_active VALUE=1

    {% elif not driver_active and previous == 1 %}
        # Remove the driver-cooling minimum and return full control to PID.
        SET_TEMPERATURE_FAN_TARGET TEMPERATURE_FAN=electronics_fan TARGET=50 MIN_SPEED=0.0 MAX_SPEED=1.0
        SET_GCODE_VARIABLE MACRO=_ELECTRONICS_FAN_STATE VARIABLE=driver_floor_active VALUE=0
    {% endif %}

    UPDATE_DELAYED_GCODE ID=_ELECTRONICS_FAN_MONITOR DURATION=2